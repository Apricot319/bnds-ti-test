            { name: "无形的大手", tag: "权力感 策划力 领导力", desc: "活动幕后的大 BOSS，擅长组织协调和规则制定。\n“表彰大会、文化日、草地音乐节，我经手的活动不可能出纰漏。”", dims: { AR:3.5, AC:3, S:4.5, R:4.5, Cr:4, ES:4.5, L:3, CM:4.5, Ch:3.5, Ath:2.5 } },
            { name: "情圣", tag: "人见人爱 花见花开 车见……", desc: "“高中就是用来谈恋爱的！不谈恋爱算我亏了。”", dims: { AR:2.5, AC:2.5, S:4, R:2.5, Cr:3.5, ES:3, L:2.5, CM:2.5, Ch:5, Ath:2.5 } },
            { name: "狛枝凪斗", tag: "超高校级的幸运", desc: '方圆星博弈大赢家，各路抽奖一击必中。\n"人生，真是易如反掌啊。"', dims: { AR:2.5, AC:2.5, S:3, R:2.5, Cr:2.5, ES:3.5, L:5, CM:3, Ch:3, Ath:2.5 } },
            { name: "行圆分负债者", tag: "低唤醒 反叛", desc: '升旗仪式失踪人口，早八永远在梦游，我签过的行圆条比你吃过的饭都多。\n"行圆分？留着有啥用？"', dims: { AR:2, AC:1.5, S:3, R:0.5, Cr:3, ES:3, L:2.5, CM:2, Ch:2.5, Ath:2.5 } },
            { name: "小迷糊", tag: "混乱秩序 纯真", desc: "不是在丢卡就是在去补办卡的路上，不过稀里糊涂地过也挺爽的嘛。\n“我去，昨天这科留作业了？”", dims: { AR:2.5, AC:2.5, S:3, R:2.5, Cr:2.5, ES:2.5, L:2.5, CM:0.5, Ch:3, Ath:2.5 } },
            { name: "年级主任", tag: "行走的正道之光", desc: "永远遵规守纪，一直想劝导同学学习，莫非你是混入的年级主任？", dims: { AR:3.5, AC:3.5, S:2.5, R:5, Cr:2.5, ES:4.5, L:2.5, CM:4, Ch:2, Ath:2.5 } },
            
            { name: "皇帝", tag: "无法无天 手眼通天", desc: "和老师处成兄弟，把学校当成后花园，这才是高中的真谛你们懂不懂。\n“龙心大悦，诸位爱卿平身。”", dims: { AR:2.5, AC:2.5, S:4.5, R:1.0, Cr:3.5, ES:4.5, L:3.5, CM:3.0, Ch:3.5, Ath:3.0 } },
            { name: "村口大喇叭", tag: "情报头子 黑白通吃", desc: "小道消息无比灵通，方圆五百里所有的瓜全知道，一个人就是一张情报网。\n“听说了吗？那个谁和那个谁……”", dims: { AR:2.5, AC:2.5, S:5.0, R:2.5, Cr:3.0, ES:3.5, L:3.0, CM:3.5, Ch:3.5, Ath:2.5 } },
            { name: "不醒人士", tag: "睡神降临 随地入眠", desc: "早读睡觉，上课睡觉，午休睡觉，自习课还是睡觉……你说这个觉咋就那么好睡呢？\n“呼……呼……下课了叫我。”", dims: { AR:1.5, AC:1.0, S:2.0, R:2.0, Cr:2.5, ES:4.0, L:3.0, CM:1.0, Ch:2.0, Ath:1.5 } },
            { name: "黑社会", tag: "法外狂徒 规则破坏者", desc: "真正的无法无天，把学校完全玩成自己的地盘。\n“这块场子，我说了算。”", dims: { AR:1.0, AC:1.0, S:4.0, R:0.5, Cr:3.0, ES:3.5, L:3.0, CM:3.0, Ch:3.0, Ath:3.5 } },
            
            { name: "入侵者", tag: "忠诚度危机……", desc: "竟然说海淀区最好的高中不是 BNDS？你是哪个学校的？", dims: { AR:0, AC:0, S:0, R:0, Cr:0, ES:0, L:0, CM:0, Ch:0, Ath:0 } }
        ];

        let currentIdx = 0;
        let scores = { AR:2.5, AC:2.5, S:2.5, R:2.5, Cr:2.5, ES:2.5, L:2.5, CM:2.5, Ch:2.5, Ath:2.5 };
        let flags = {
            isTraitor: false, preventJuanWang: false,
            emperor1: false, emperor2: false, emperor3: false,
            sleep1: false, sleep2: false,
            daba1: false, daba2: false, daba3: false, daba4: false
        };
        let historyStack = [];

        function startTest() { 
            currentIdx = 0;
            scores = { AR:2.5, AC:2.5, S:2.5, R:2.5, Cr:2.5, ES:2.5, L:2.5, CM:2.5, Ch:2.5, Ath:2.5 };
            flags = {
                isTraitor: false, preventJuanWang: false,
                emperor1: false, emperor2: false, emperor3: false,
                sleep1: false, sleep2: false,
                daba1: false, daba2: false, daba3: false, daba4: false
            };
            historyStack = [];
            switchScreen('screen-test'); 
            renderQuestion(); 
        }
        
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goBack() {
            if(currentIdx > 0 && historyStack.length > 0) {
                const prevState = historyStack.pop();
                scores = prevState.scores;
                flags = prevState.flags;
                currentIdx--;
                renderQuestion();
            }
        }

        function renderQuestion() {
            const backBtn = document.getElementById('back-btn');
            if(currentIdx > 0) backBtn.classList.remove('invisible');
            else backBtn.classList.add('invisible');

            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${questions.length}`;

            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = `${currentIdx + 1}. ${q.text}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 px-6 bg-surface-container/50 hover:bg-primary hover:text-white rounded-2xl text-sm font-bold transition-all text-left shadow-sm";
                btn.innerText = opt.text;
                btn.onclick = () => {
                    historyStack.push({
                        scores: JSON.parse(JSON.stringify(scores)),
                        flags: JSON.parse(JSON.stringify(flags))
                    });

                    if(opt.delta) {
                        for(let d in opt.delta) {
                            scores[d] = Math.max(0, Math.min(5, scores[d] + opt.delta[d]));
                        }
                    }
                    if(opt.setFlags) {
                        for(let f in opt.setFlags) {
                            flags[f] = opt.setFlags[f];
                        }
                    }
                    
                    currentIdx++;
                    if(currentIdx < questions.length) renderQuestion();
                    else calculateResult();
                };
                container.appendChild(btn);
            });
            
            document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
        }

        function calculateResult() {
            let res = null;
            
            if (flags.isTraitor) {
                res = personalities.find(p => p.name === "入侵者");
            } 
            else if (flags.emperor1 && flags.emperor2 && flags.emperor3 && scores.R < 2.0) {
                res = personalities.find(p => p.name === "皇帝");
            } 
            else if (flags.daba1 && flags.daba2 && flags.daba3 && flags.daba4) {
                res = personalities.find(p => p.name === "村口大喇叭");
            } 
            else if (flags.sleep1 && flags.sleep2) {
                res = personalities.find(p => p.name === "不醒人士");
            } 
            else if (scores.R <= 1.0 && scores.AR <= 2.0 && scores.AC <= 2.0) {
                res = personalities.find(p => p.name === "黑社会");
            } 
            else {
                let minDistance = Infinity;
                const specialNames = ["入侵者", "村口大喇叭", "皇帝", "不醒人士", "黑社会"];
                
                personalities.forEach(p => { 
                    if (specialNames.includes(p.name)) return; 
                    if (flags.preventJuanWang && p.name === "卷王") return; 
                    
                    let distance = 0; 
                    for(let k in p.dims) {
                        distance += Math.abs(scores[k] - p.dims[k]); 
                    }
                    if(distance < minDistance) { 
                        minDistance = distance; 
                        res = p; 
                    } 
                });
                
                if(minDistance > 16) {
                    res = { 
                        name: "龙娃", 
                        tag: "健全立体的天选BNDSer", 
                        desc: "每个人格都沾点，你是 +-TI 逻辑中那个最平衡、最独特的灵魂。" 
                    };
                }
            }
            displayResult(res);
        }

        function displayResult(p) {
            switchScreen('screen-result');
            
            document.getElementById('result-name').innerText = p.name;
            document.getElementById('result-tag').innerText = p.tag;
            document.getElementById('result-desc').innerText = p.desc;
            
            const dc = document.getElementById('dim-container');
            dc.innerHTML = '';
            
            if(p.name !== "入侵者") {
                const dimNames = { AR:'学术广度', AC:'刻苦度', S:'社交', R:'规则', Cr:'创意', ES:'情绪稳定', L:'运气', CM:'清醒度', Ch:'桃花', Ath:'体育' };
                for(let k in dimNames) {
                    dc.innerHTML += `<div class="p-3 bg-surface-container/30 rounded-xl shadow-sm flex justify-between items-center">
                        <span class="text-[10px] text-on-surface/70">${dimNames[k]}</span>
                        <span class="text-xs text-primary font-black">${scores[k].toFixed(1)}</span>
                    </div>`;
                }
            }
        }
    </script>
